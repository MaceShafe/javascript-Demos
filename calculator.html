<head>
    <script type="text/javascript" src="calculator.js"></script>
    <link rel="stylesheet" href="calculator.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>
    <div class="header">
        <h1>Simple Calculator</h1>

    </div>

    <div class="center">
        <div class="calcDisplay" id="calcNumber">
            0
        </div>


        <div class="calcContainer">

            <button class="calcButton" onclick="insertNumber('7')">7</button>
            <button class="calcButton" onclick="insertNumber('8')">8</button>
            <button class="calcButton" onclick="insertNumber('9')">9</button>
            <button class="calcButton" onclick="divide()">/</button>

            <button class="calcButton" onclick="insertNumber('4')">4</button>
            <button class="calcButton" onclick="insertNumber('5')">5</button>
            <button class="calcButton" onclick="insertNumber('6')">6</button>
            <button class="calcButton" onclick="multiply()">x</button>

            <button class="calcButton" onclick="insertNumber('1')">1</button>
            <button class="calcButton" onclick="insertNumber('2')">2</button>
            <button class="calcButton" onclick="insertNumber('3')">3</button>
            <button class="calcButton" onclick="subtract()">-</button>

            <button class="calcButton" onclick="insertNumber('0')">0</button>
            <button class="calcButton">.</button>
            <button class="calcButton" onclick="equals()">=</button>
            <button class="calcButton" onclick="add()">+</button>




        </div>
    </div>
</body>
